services:
  shop-corner-next:
    container_name: shop-corner-next
    restart: always
    image: node:20.20.0

    ports:
      - '4000:3000'

    environment:
      - PORT=3000

    volumes:
      - ./:/usr/src/shop-corner-next

    working_dir: /usr/src/shop-corner-next

    command: bash -c "yarn && yarn run build && yarn run start"

    networks:
      - client-network

networks:
  client-network:
    driver: bridge
